### model
model_name_or_path: /data/user/jiangkailin/data_ckpt/ckpt/Qwen3-VL-4B-Instruct
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: MMEVOKE
template: qwen3_vl_nothink
cutoff_len: 2048
max_samples: 10000000000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /data/user/jiangkailin/data_ckpt/train_ckpt/knowledge_manipulation/Qwen3-VL-4B-Instruct/full
logging_steps: 1
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: swanlab  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 24
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 6.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

